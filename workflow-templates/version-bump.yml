name: Version Bump

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version increment type"
        required: true
        type: choice
        options:
          - major
          - minor
          - patch
      prerelease:
        description: "Optional prerelease suffix (example: alpha)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ensure default branch
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          branch=$(git branch --show-current)
          if [ "$branch" != "$DEFAULT_BRANCH" ]; then
            echo "This workflow must run on the default branch: $DEFAULT_BRANCH"
            exit 1
          fi

      - name: Initialize v0.0.0 if missing
        run: |
          if git tag | grep -q '^v0.0.0$'; then
            echo "v0.0.0 already exists"
          else
            first_commit=$(git rev-list --max-parents=0 HEAD)
            git tag v0.0.0 "$first_commit"
            git push origin v0.0.0
          fi

      - name: Determine next version
        id: version
        env:
          BUMP: ${{ github.event.inputs.bump }}
          PRERELEASE: ${{ github.event.inputs.prerelease }}
        run: |
          set -e

          latest=$(git tag -l 'v*' --sort=-v:refname | head -n1)

          version=${latest#v}
          version=${version%%-*}

          IFS='.' read -r major minor patch <<< "$version"

          if [ "$BUMP" = "major" ]; then
            major=$((major + 1))
            minor=0
            patch=1
          elif [ "$BUMP" = "minor" ]; then
            minor=$((minor + 1))
            patch=1
          else
            patch=$((patch + 1))
          fi

          new="v$major.$minor.$patch"

          if [ -n "$PRERELEASE" ]; then
            new="$new-$PRERELEASE"
          fi

          echo "new_version=$new" >> "$GITHUB_OUTPUT"
          echo "Next version: $new"

      - name: Create tag
        run: |
          tag="${{ steps.version.outputs.new_version }}"
          git tag "$tag"
          git push origin "$tag"
